<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duelos de Historia - Tema 6</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-database-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-auth-compat.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #eff6ff, #e0e7ff); min-height: 100vh; padding: 12px; color: #1e293b; }
  .wrap { max-width: 640px; margin: 0 auto; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  h1 { font-size: 1.5rem; font-weight: 800; color: #3730a3; }
  .sub { color: #4f46e5; font-size: .9rem; }
  .btn-ghost { background: none; border: none; font-size: .8rem; color: #94a3b8; cursor: pointer; }
  .btn-ghost:hover { color: #64748b; }
  .btn-exit { font-size: .8rem; background: #dcfce7; color: #15803d; border: none; padding: 4px 10px; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .login-box { background: #fff; border-radius: 10px; padding: 10px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); display: flex; gap: 8px; }
  .login-box input { flex: 1; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: .9rem; }
  .login-box button { background: #4f46e5; color: #fff; border: none; padding: 0 14px; border-radius: 6px; font-size: .9rem; cursor: pointer; }
  .clases { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
  .clases button { padding: 8px 16px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; background: #fff; color: #4f46e5; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .clases button.active { background: #4f46e5; color: #fff; }
  .tabs { display: flex; background: #fff; border-radius: 10px; padding: 4px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .tabs button { flex: 1; padding: 8px; border-radius: 8px; border: none; background: none; font-weight: 600; color: #4f46e5; cursor: pointer; font-size: .85rem; }
  .tabs button.active { background: #4f46e5; color: #fff; }
  .msg { background: #fff; border-radius: 10px; padding: 10px; margin-bottom: 12px; text-align: center; font-weight: 600; color: #3730a3; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .card { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  label { display: block; font-size: .85rem; font-weight: 600; color: #374151; margin-bottom: 4px; }
  select { width: 100%; padding: 12px; border: 2px solid #c7d2fe; border-radius: 10px; font-size: 1rem; margin-bottom: 14px; background: #fff; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .win, .lose { padding: 16px 8px; color: #fff; font-weight: 800; font-size: 1.1rem; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,.15); }
  .win { background: #22c55e; } .win:hover { background: #16a34a; }
  .lose { background: #f97316; } .lose:hover { background: #ea580c; }
  .win small, .lose small { display: block; font-weight: 400; font-size: .8rem; margin-top: 2px; }
  h2 { font-size: 1.1rem; color: #3730a3; margin-bottom: 10px; }
  .rank-list, .hist-list { max-height: 420px; overflow-y: auto; }
  .rank-row { display: flex; align-items: center; padding: 8px; border-radius: 8px; }
  .rank-row.top { background: #eef2ff; }
  .pos { width: 32px; text-align: center; font-weight: 700; color: #94a3b8; }
  .rank-row .name { flex: 1; margin-left: 8px; font-size: .9rem; }
  .rank-row .pts { font-weight: 700; color: #4f46e5; }
  .rank-row .pts.zero { color: #cbd5e1; }
  .hist-row { padding: 8px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: .9rem; }
  .hist-row.win-row { background: #f0fdf4; }
  .hist-row.lose-row { background: #fff7ed; }
  .hist-row .fecha { color: #94a3b8; font-size: .75rem; }
  .hist-row button { background: none; border: none; color: #fca5a5; font-size: 1.2rem; cursor: pointer; }
  .del-btn { font-size: .75rem; padding: 4px 8px; border-radius: 6px; border: none; cursor: pointer; margin-left: 6px; }
  .del-btn.class { background: #fee2e2; color: #dc2626; }
  .del-btn.all { background: #dc2626; color: #fff; }
  table { width: 100%; font-size: .9rem; border-collapse: collapse; }
  th { text-align: left; padding: 8px 4px; border-bottom: 1px solid #e5e7eb; }
  td { padding: 8px 4px; border-bottom: 1px solid #f1f5f9; }
  .nota-badge { padding: 3px 8px; border-radius: 6px; font-weight: 700; }
  .n-verde { background: #f0fdf4; color: #16a34a; }
  .n-azul { background: #eff6ff; color: #2563eb; }
  .n-amarillo { background: #fefce8; color: #ca8a04; }
  .n-rojo { background: #fef2f2; color: #dc2626; }
  .escala { margin-top: 14px; padding: 10px; background: #f8fafc; border-radius: 10px; font-size: .75rem; color: #64748b; }
  .escala span { display: inline-block; padding: 3px 8px; border-radius: 6px; margin: 2px; }
  .footer { text-align: center; color: #94a3b8; font-size: .75rem; margin-top: 16px; }
  .empty { text-align: center; color: #94a3b8; padding: 20px; }
  .status { font-size: .7rem; text-align: center; color: #94a3b8; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>⚔️ Duelos de Historia</h1>
      <p class="sub">Tema 6</p>
    </div>
    <div id="authArea"></div>
  </div>

  <div class="status" id="status">Conectando...</div>

  <div class="login-box" id="loginBox" style="display:none">
    <input type="password" id="claveInput" placeholder="Clave profesor">
    <button onclick="verificarClave()">Entrar</button>
  </div>

  <div class="clases" id="clasesBar"></div>
  <div class="tabs" id="tabsBar"></div>
  <div class="msg" id="mensaje" style="display:none"></div>
  <div id="contenido"></div>
  <p class="footer">Datos sincronizados en tiempo real vía Firebase</p>
</div>

<script>
// ===================== CONFIGURACIÓN FIREBASE =====================
// Sustituye por la config de tu proyecto Firebase (mismo patrón que tus otras apps EF)
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  databaseURL: "https://TU_PROYECTO-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "TU_PROYECTO",
  storageBucket: "TU_PROYECTO.appspot.com",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

const CLAVE_PROFESOR = "triana2027";
let db = null;
let demoMode = false;
let demoPuntos = {};
let demoHistorial = [];

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  firebase.auth().signInAnonymously().catch(() => { demoMode = true; });
} catch (e) {
  demoMode = true;
}

// ===================== DATOS DE ALUMNOS =====================
const alumnos = {
  "2ºA": [
    "Amaro Porras, Bosco", "Avilés Gallardo, Sofía", "Batista Hidalgo, Rafael Josué",
    "Carrillo Torvisco, Fernando", "Casado De la Rosa, Daniela", "Company Del Val, Quique",
    "Cuevas Espí, Manuel", "Ferrer Fernández, Ainara", "García Casado, Ignacio",
    "García Muñoz, Marcel", "Garzón Delgado, Rubén", "Gavilán Fonseca, Lola",
    "González Brigidano, Elena", "Herranz Fraile, Javier", "Jiménez De Rueda, María Eugenia",
    "López López, Emma", "López Solis, Jorge", "Marín Hermosilla, Manuel",
    "Merro Muñoz, Alejo", "Merro Muñoz, Felipe", "Molina Pacheco, Lola",
    "Morato Gómez, Alejandro", "Navarro García, Claudia", "Nieto Domínguez, Ignacio",
    "Pina Fernández, Valeria", "Puelles Moya, Pablo", "Vázquez Sanabria, Irma Patricia",
    "Vizcarra Oré, Gonzalo Miguel"
  ],
  "2ºB": [
    "Acosta Martel, Kevin", "Alcalá Marroquí, Patricia María", "Campos García, Miriam",
    "Campos Garrido, Sonia", "Chekroun Murillo, Blanca", "Díaz Suárez, Jesús",
    "Domínguez Saavedra, Román", "Donlon Schmidt, Michael Joel", "Ferrer Ramírez, Mario",
    "Gatón Bejar, Manuel", "Gener Amador, María", "González Gutiérrez, Manuel María",
    "Manzano Galindo, Valentina", "Marcano Domínguez, Marina", "Martínez López, Luis",
    "Maya Moreno, Marta", "Medrano Cid, Nicolás", "Mendieta Cruz, Jorge",
    "Mula Pérez-Leiva, Bruno", "Parrón Ruiz, David", "Picazo Goroi, Rubyhn Macarena",
    "Rastrollo Rodríguez, Miguel Ángel", "Redondo Camacho, María Rocío", "Sánchez Calvillo, Paula",
    "Sánchez Ogazón, Eusebio Javier", "Simoes Lara, Darío", "Tirado Barranca, Lola",
    "Vargas Romero, Blanca", "Vera Muñoz-Reja, Beatriz", "Vinces Sánchez, Carmen Noelia"
  ],
  "2ºC": [
    "Balbontín Martínez, Bosco", "Bellido Aranda, Claudia Salud", "Boscán Trocónis, Abrahám José",
    "Cabello Toscano, Ariadna Stefanía", "De Labra Borrero, Breogan", "Díaz Cruz, Álvaro",
    "Gordillo Ramos Catalina, Paula", "Jiménez Sánchez, Ángela Paola", "Lamet Correa, Lola",
    "Lerín Ramírez, Adrián", "Macías Cano, Jesús", "Marchena Jiménez, Jaime",
    "Martín Delgado, Sergio", "Martínez Álvarez de Cienfuegos, Carmen", "Martínez Sánchez, Martín",
    "Mateo Arispón, Ainhoa", "Medina Rodríguez, Lucas", "Méndez Delgado, Eric",
    "Moreno Grove, Irene", "Navarro Pérez, Alba", "Olivencia Martínez, Pilar",
    "Oribe Ruibérriz de Torres, Elena", "Peralvo De la Rosa, Aitana", "Ponce Liñán, Marcos",
    "Ramos Martín, Julio", "Soler Martínez, Manuel Antonio", "Uncala Villarán, Julio",
    "Valiente García, Alejandro", "Zoido Maraver, Francisco Javier"
  ]
};
const PUNTOS_MAXIMOS = { "2ºA": 81, "2ºB": 87, "2ºC": 84 };

// ===================== ESTADO =====================
let state = {
  clase: "2ºA",
  jugador: "",
  rival: "",
  puntos: {},
  historial: [],
  vista: "registro",
  modoProfesor: false,
  mostrarLogin: false
};

function setStatus(txt) { document.getElementById('status').textContent = txt; }

// ===================== CARGA / GUARDADO DE DATOS =====================
function initDataSync() {
  if (demoMode || !db) {
    setStatus('⚠️ Modo demo (sin conexión a Firebase) — configura firebaseConfig');
    state.puntos = demoPuntos;
    state.historial = demoHistorial;
    render();
    return;
  }
  setStatus('🟢 Conectado — sincronizando en tiempo real');
  db.ref('duelosHistoria/puntos').on('value', snap => {
    state.puntos = snap.val() || {};
    render();
  });
  db.ref('duelosHistoria/historial').on('value', snap => {
    const val = snap.val() || {};
    state.historial = Object.keys(val).map(k => ({ id: k, ...val[k] })).sort((a, b) => b.ts - a.ts);
    render();
  });
}

async function saveResultado(entry) {
  const key = `${state.clase}-${entry.jugador}`;
  const nuevoPunto = (state.puntos[key] || 0) + entry.puntos;
  if (demoMode || !db) {
    demoPuntos[key] = nuevoPunto;
    demoHistorial.unshift({ id: 'd' + Date.now(), ...entry });
    state.puntos = demoPuntos;
    state.historial = demoHistorial;
    render();
    return;
  }
  await db.ref(`duelosHistoria/puntos/${key}`).set(nuevoPunto);
  await db.ref('duelosHistoria/historial').push({ ...entry });
}

async function eliminarRegistro(reg) {
  const key = `${reg.clase}-${reg.jugador}`;
  const nuevoPunto = Math.max(0, (state.puntos[key] || 0) - reg.puntos);
  if (demoMode || !db) {
    demoPuntos[key] = nuevoPunto;
    demoHistorial = demoHistorial.filter(h => h.id !== reg.id);
    state.puntos = demoPuntos;
    state.historial = demoHistorial;
    render();
    return;
  }
  await db.ref(`duelosHistoria/puntos/${key}`).set(nuevoPunto);
  await db.ref(`duelosHistoria/historial/${reg.id}`).remove();
}

async function borrarClase(clase) {
  if (!confirm(`¿Borrar TODOS los datos de ${clase}?`)) return;
  if (demoMode || !db) {
    Object.keys(demoPuntos).forEach(k => { if (k.startsWith(clase + '-')) delete demoPuntos[k]; });
    demoHistorial = demoHistorial.filter(h => h.clase !== clase);
    state.puntos = demoPuntos; state.historial = demoHistorial;
    render();
    return;
  }
  const updates = {};
  Object.keys(state.puntos).forEach(k => { if (k.startsWith(clase + '-')) updates[k] = null; });
  await db.ref('duelosHistoria/puntos').update(updates);
  const toRemove = state.historial.filter(h => h.clase === clase);
  for (const h of toRemove) await db.ref(`duelosHistoria/historial/${h.id}`).remove();
}

async function borrarTodo() {
  if (!confirm('¿Borrar TODOS los datos de todas las clases?')) return;
  if (demoMode || !db) {
    demoPuntos = {}; demoHistorial = [];
    state.puntos = {}; state.historial = [];
    render();
    return;
  }
  await db.ref('duelosHistoria/puntos').set(null);
  await db.ref('duelosHistoria/historial').set(null);
}

// ===================== LÓGICA =====================
function getClasificacion(cl) {
  return alumnos[cl]
    .map(n => ({ nombre: n, puntos: state.puntos[`${cl}-${n}`] || 0 }))
    .sort((a, b) => b.puntos - a.puntos);
}
function calcularNota(pts, cl) {
  const max = PUNTOS_MAXIMOS[cl];
  return Math.min(10, Math.round((pts / max) * 10 * 10) / 10);
}
function notaClass(n) {
  if (n >= 9) return 'n-verde';
  if (n >= 7) return 'n-azul';
  if (n >= 5) return 'n-amarillo';
  return 'n-rojo';
}
function mostrarMensaje(txt) {
  const el = document.getElementById('mensaje');
  el.style.display = 'block';
  el.textContent = txt;
  clearTimeout(window._msgTimeout);
  window._msgTimeout = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function registrar(victoria) {
  if (!state.jugador || !state.rival) { mostrarMensaje("⚠️ Selecciona tu nombre y rival"); return; }
  if (state.jugador === state.rival) { mostrarMensaje("⚠️ No puedes enfrentarte a ti mismo"); return; }
  const pts = victoria ? 3 : 1;
  const entry = {
    fecha: new Date().toLocaleString('es-ES'),
    ts: Date.now(),
    clase: state.clase,
    jugador: state.jugador,
    rival: state.rival,
    resultado: victoria ? "Victoria" : "Derrota",
    puntos: pts
  };
  saveResultado(entry);
  mostrarMensaje(victoria ? `🏆 ¡${state.jugador.split(',')[0]} gana! +3 puntos` : `📝 ${state.jugador.split(',')[0]} suma 1 punto`);
  state.jugador = ""; state.rival = "";
  render();
}

function verificarClave() {
  const val = document.getElementById('claveInput').value;
  if (val === CLAVE_PROFESOR) {
    state.modoProfesor = true; state.mostrarLogin = false;
    mostrarMensaje("🔓 Modo profesor activado");
  } else {
    mostrarMensaje("❌ Clave incorrecta");
  }
  render();
}

// ===================== RENDER =====================
function render() {
  // barra de clases
  const clasesBar = document.getElementById('clasesBar');
  clasesBar.innerHTML = Object.keys(alumnos).map(c =>
    `<button class="${state.clase === c ? 'active' : ''}" onclick="cambiarClase('${c}')">${c}</button>`
  ).join('');

  // tabs
  const tabs = [
    { id: 'registro', label: '📝 Registrar' },
    { id: 'clasificacion', label: '🏆 Ranking' },
    { id: 'historial', label: '📋 Historial' }
  ];
  if (state.modoProfesor) tabs.push({ id: 'notas', label: '📊 Notas' });
  document.getElementById('tabsBar').innerHTML = tabs.map(t =>
    `<button class="${state.vista === t.id ? 'active' : ''}" onclick="cambiarVista('${t.id}')">${t.label}</button>`
  ).join('');

  // auth area
  document.getElementById('authArea').innerHTML = state.modoProfesor
    ? `<button class="btn-exit" onclick="salirProfesor()">👨‍🏫 Salir</button>`
    : `<button class="btn-ghost" onclick="toggleLogin()">🔐</button>`;

  document.getElementById('loginBox').style.display = (state.mostrarLogin && !state.modoProfesor) ? 'flex' : 'none';

  // contenido
  const c = document.getElementById('contenido');
  if (state.vista === 'registro') c.innerHTML = renderRegistro();
  else if (state.vista === 'clasificacion') c.innerHTML = renderClasificacion();
  else if (state.vista === 'historial') c.innerHTML = renderHistorial();
  else if (state.vista === 'notas' && state.modoProfesor) c.innerHTML = renderNotas();
}

function renderRegistro() {
  const opciones = alumnos[state.clase].map(a => `<option value="${a}" ${state.jugador === a ? 'selected' : ''}>${a}</option>`).join('');
  const opcionesRival = alumnos[state.clase].filter(a => a !== state.jugador)
    .map(a => `<option value="${a}" ${state.rival === a ? 'selected' : ''}>${a}</option>`).join('');
  return `
    <div class="card">
      <label>Yo soy:</label>
      <select onchange="setJugador(this.value)">
        <option value="">-- Selecciona tu nombre --</option>${opciones}
      </select>
      <label>Me enfrenté a:</label>
      <select onchange="setRival(this.value)">
        <option value="">-- Selecciona rival --</option>${opcionesRival}
      </select>
      <div class="grid2">
        <button class="win" onclick="registrar(true)">🏆 GANÉ<small>+3 puntos</small></button>
        <button class="lose" onclick="registrar(false)">😤 PERDÍ<small>+1 punto</small></button>
      </div>
    </div>`;
}

function renderClasificacion() {
  const lista = getClasificacion(state.clase);
  const filas = lista.map((al, i) => {
    let medal = `${i + 1}.`;
    if (i === 0 && al.puntos > 0) medal = '🥇';
    else if (i === 1 && al.puntos > 0) medal = '🥈';
    else if (i === 2 && al.puntos > 0) medal = '🥉';
    return `
      <div class="rank-row ${i < 3 && al.puntos > 0 ? 'top' : ''}">
        <span class="pos">${medal}</span>
        <span class="name">${al.nombre}</span>
        <span class="pts ${al.puntos === 0 ? 'zero' : ''}">${al.puntos} pts</span>
      </div>`;
  }).join('');
  return `
    <div class="card">
      <h2>🏆 Clasificación ${state.clase}</h2>
      <div class="rank-list">${filas}</div>
    </div>`;
}

function renderHistorial() {
  const items = state.historial.filter(h => h.clase === state.clase);
  const botonesProfe = state.modoProfesor ? `
      <div>
        <button class="del-btn class" onclick="borrarClase('${state.clase}')">Borrar ${state.clase}</button>
        <button class="del-btn all" onclick="borrarTodo()">Borrar TODO</button>
      </div>` : '';
  const filas = items.length === 0
    ? `<p class="empty">No hay enfrentamientos en ${state.clase}</p>`
    : `<div class="hist-list">${items.map(h => `
        <div class="hist-row ${h.resultado === 'Victoria' ? 'win-row' : 'lose-row'}">
          <div>
            <div>${h.jugador.split(',')[0]} vs ${h.rival.split(',')[0]}</div>
            <div class="fecha">${h.fecha} · ${h.resultado} (+${h.puntos})</div>
          </div>
          ${state.modoProfesor ? `<button onclick='eliminarRegistroJson(${JSON.stringify(h).replace(/'/g, "&apos;")})'>×</button>` : ''}
        </div>`).join('')}</div>`;
  return `
    <div class="card">
      <div class="top" style="margin-bottom:10px">
        <h2>📋 Historial ${state.clase}</h2>
        ${botonesProfe}
      </div>
      ${filas}
    </div>`;
}

function renderNotas() {
  const lista = getClasificacion(state.clase);
  const filas = lista.map(al => {
    const nota = calcularNota(al.puntos, state.clase);
    return `<tr>
      <td>${al.nombre}</td>
      <td style="text-align:center;color:#4f46e5;font-weight:600">${al.puntos}</td>
      <td style="text-align:center"><span class="nota-badge ${notaClass(nota)}">${nota}</span></td>
    </tr>`;
  }).join('');
  return `
    <div class="card">
      <h2>📊 Notas ${state.clase}</h2>
      <p style="font-size:.75rem;color:#94a3b8;margin-bottom:10px">Máximo ${PUNTOS_MAXIMOS[state.clase]} pts = 10 | ${PUNTOS_MAXIMOS[state.clase] / 2} pts = 5</p>
      <table>
        <thead><tr><th>Alumno</th><th style="text-align:center">Pts</th><th style="text-align:center">Nota</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>
      <div class="escala">
        <strong>Escala de colores:</strong><br>
        <span class="n-verde">9-10 Sobresaliente</span>
        <span class="n-azul">7-8.9 Notable</span>
        <span class="n-amarillo">5-6.9 Aprobado</span>
        <span class="n-rojo">0-4.9 Suspenso</span>
      </div>
    </div>`;
}

// ===================== HANDLERS GLOBALES =====================
function cambiarClase(c) { state.clase = c; state.jugador = ""; state.rival = ""; render(); }
function cambiarVista(v) { state.vista = v; render(); }
